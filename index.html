<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SESHEN | Premium E-Commerce</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <div class="cart-icon-container" onclick="toggleCart()">
            <i class="fas fa-shopping-cart"></i>
            <span id="cart-count">0</span>
        </div>
        <div class="header-content">
            <div class="logo-container">
                <img src="lotus-logo.png" alt="SESHEN Logo" class="main-logo">
                <h1 class="brand-name">SESHEN</h1>
            </div>
        </div>
    </header>

    <main id="main-content">
        <section id="home-grid" class="home-grid">
            <div class="window labels" onclick="navigateTo('labels')"><h2>Labels</h2></div>
            <div class="window cosmetics" onclick="navigateTo('cosmetics')"><h2>Cosmetics</h2></div>
            <div class="window accessories" onclick="navigateTo('accessories')"><h2>Accessories</h2></div>
            <div class="window keychains" onclick="navigateTo('keychains')"><h2>Keychains</h2></div>
        </section>

        <section id="product-page" class="hidden">
            <button class="back-btn" onclick="goHome()">← Back to Home</button>
            <div id="page-content"></div>
        </section>
    </main>

    <div id="cart-sidebar" class="cart-sidebar">
        <button class="close-cart" onclick="toggleCart()">×</button>
        <h2>سلة المشتريات</h2>
        <div id="cart-items"></div>
        <div class="cart-footer">
            <p>الإجمالي: <span id="cart-total">0</span> EGP</p>
            <button class="checkout-btn" onclick="showCheckoutForm()">إتمام الشراء</button>
        </div>
    </div>

    <div id="checkout-modal" class="modal hidden">
        <div class="modal-content">
            <h3>بيانات الشحن</h3>
            <form id="order-form">
                <input type="text" id="user-name" placeholder="الاسم بالكامل" required>
                <input type="tel" id="user-phone" placeholder="رقم التليفون" required>
                <textarea id="user-address" placeholder="العنوان بالتفصيل" required></textarea>
                <button type="submit" class="confirm-btn">تأكيد الطلب</button>
                <button type="button" onclick="hideCheckoutForm()" class="cancel-btn">إلغاء</button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 SESHEN. Professional Elegance.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
<style>
    :root {
    --brand-blue: #003366;
    --white: #ffffff;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Inter', sans-serif;
    background-color: #f4f7f6;
    overflow-x: hidden;
}

/* الهيدر */
header {
    background-color: var(--brand-blue);
    padding: 20px;
    text-align: center;
    color: white;
}
.main-logo { width: 80px; height: auto; margin-bottom: 10px; }
.brand-name { font-size: 1.5rem; letter-spacing: 3px; text-transform: uppercase; }

/* الأقسام الرئيسية */
.home-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px; padding: 25px;
}
.window {
    height: 150px; display: flex; align-items: center; justify-content: center;
    border-radius: 12px; cursor: pointer; color: white; font-weight: bold;
}
.labels { background-color: #90ee90; color: #1a3a1a !important; }
.cosmetics { background-color: #556b2f; }
.accessories { background-color: #800020; }
.keychains { background-color: #008080; }

/* --- شبكة المنتجات (تعديل الحجم هنا) --- */
.product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); /* الاستيكرات بقت أصغر وملمومة */
    gap: 15px; padding: 15px;
}

.product-card {
    background: white; padding: 10px; border-radius: 10px;
    text-align: center; box-shadow: 0 4px 8px rgba(0,0,0,0.05);
}

.img-container {
    width: 100%; height: 130px; /* مقاس ملموم جداً */
    margin-bottom: 8px;
}

.img-container img {
    width: 100%; height: 100%; object-fit: contain;
}

.price { color: var(--brand-blue); font-weight: bold; font-size: 1rem; margin: 5px 0; }

.buy-btn {
    background: var(--brand-blue); color: white; border: none;
    padding: 8px; width: 100%; border-radius: 5px; cursor: pointer;
}

/* --- المودال (شاشة البيانات) --- */
.modal {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85); z-index: 9999;
    display: none; justify-content: center; align-items: center;
}
/* ده الكلاس اللي هيظهر الشاشة */
.modal.active { display: flex !important; }

.modal-content {
    background: white; padding: 25px; border-radius: 15px;
    width: 90%; max-width: 400px; text-align: center;
}
.modal-content input, .modal-content textarea {
    width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px;
}

/* السلة (هتفضل مخفية إلا لو احتاجناها) */
.cart-sidebar { display: none; }

.hidden { display: none !important; }
.back-btn { margin: 20px; padding: 10px; cursor: pointer; }
</style>
<script>
    let cart = [];
const products = { labels: [] };

// 1. توليد الاستيكرات
for (let i = 1; i <= 42; i++) {
    products.labels.push({
        id: i,
        name: `Sticker ${i}`,
        price: 20,
        img: `stickers/image${i}.jpg` 
    });
}

// 2. تفعيل EmailJS باستخدام الـ Public Key (من صورة Account)
(function() {
    emailjs.init("Nlnk5PAJFTGzPSZbK"); //
})();

function navigateTo(category) {
    document.getElementById('home-grid').classList.add('hidden');
    document.getElementById('product-page').classList.remove('hidden');
    const content = document.getElementById('page-content');

    if (category === 'labels') {
        content.innerHTML = `<div class="product-grid">
            ${products.labels.map(p => `
                <div class="product-card">
                    <div class="img-container">
                        <img src="${p.img}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/150?text=No+Image'">
                    </div>
                    <h3>${p.name}</h3>
                    <p class="price">${p.price} EGP</p>
                    <button class="buy-btn" onclick="addToCart(${p.id})">Buy Now</button>
                </div>
            `).join('')}
        </div>`;
    }
}

function addToCart(id) {
    const product = products.labels.find(p => p.id === id);
    if(product) {
        cart.push(product);
        updateCartUI();
        showCheckoutForm(); 
    }
}

function updateCartUI() {
    const countElem = document.getElementById('cart-count');
    if(countElem) countElem.innerText = cart.length;
}

function showCheckoutForm() {
    if (cart.length === 0) return alert("السلة فارغة!");
    const modal = document.getElementById('checkout-modal');
    if(modal) modal.classList.add('active');
}

function hideCheckoutForm() {
    const modal = document.getElementById('checkout-modal');
    if(modal) modal.classList.remove('active');
}

function goHome() {
    document.getElementById('home-grid').classList.remove('hidden');
    document.getElementById('product-page').classList.add('hidden');
}

// 3. الإرسال الفعلي بالبيانات اللي نجحت في الصور
document.getElementById('order-form').onsubmit = function(e) {
    e.preventDefault();

    const details = cart.map(p => p.name).join(' , ');
    const total = cart.reduce((sum, p) => sum + p.price, 0);

    const templateParams = {
        user_name: document.getElementById('user-name').value,
        user_phone: document.getElementById('user-phone').value,
        user_address: document.getElementById('user-address').value,
        order_details: details,
        total_price: total + " EGP"
    };

    // تم التحديث لـ service_381sf4d (الناجحة في صورة الـ History والجيميل)
    // و template_e20euif (من صورة الـ Templates)
    emailjs.send('service_381sf4d', 'template_e20euif', templateParams)
        .then(function(response) {
            alert(`مبروك يا ${templateParams.user_name}! الطلب وصلني بنجاح.`);
            cart = [];
            updateCartUI();
            hideCheckoutForm();
        }, function(error) {
            alert("للأسف حصل مشكلة، حاولي تاني.");
            console.error("EmailJS Error:", error);
        });
};
</script>
